name: Deploy roadmap to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build
        env:
          BASE_PATH: /${{ github.event.repository.name }}

      - name: 🐛 Debug: Show build output
        run: |
          echo "=== 📁 Contents of ./out directory ==="
          ls -laR ./out | head -50
          
          echo -e "\n=== 🔍 Checking for critical files ==="
          if [ -f "./out/index.html" ]; then
            echo "✅ index.html FOUND at root"
            echo "📏 Size: $(wc -c < ./out/index.html) bytes"
          else
            echo "❌ index.html MISSING at root!"
          fi
          
          if [ -f "./out/edtechlab-roadmap/index.html" ]; then
            echo "✅ index.html found in basePath folder"
          fi
          
          echo -e "\n=== 📄 First 30 lines of root index.html ==="
          head -n 30 ./out/index.html 2>/dev/null || echo "File not accessible"
          
          echo -e "\n=== 🌐 Checking for _next/static ==="
          ls -la ./out/_next/static 2>/dev/null || echo "_next/static not found"

      - name: Disable Jekyll processing
        run: |
          mkdir -p ./out
          touch ./out/.nojekyll
          echo "✅ Created .nojekyll in ./out"
          ls -la ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
